<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIOMETRICS || ATHLETIC CENTRE FITNESS HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Roboto+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="ybmistyle.css">
    
</head>
<body>
  <script src="ybmiscript.js"></script>
    <nav>
        <a href="index.html" class="logo">ATHLETIC CENTRE FITNESS HUB</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="workout.html">Workouts</a></li>
            <li><a href="ybmi.html" style="color:var(--accent)">BMI</a></li>
            <li><a href="zcontact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="tech-panel">
            <div class="header">
                <h2>ANALYZE BIOMETRICS</h2>
            </div>
            <div class="input-group">
                <label>System Weight (kg)</label>
                <input type="number" id="weight" placeholder="00.0">
            </div>
            <div class="input-group">
                <label>System Height (cm)</label>
                <input type="number" id="height" placeholder="000">
            </div>
            <button class="btn-analyze" onclick="runAnalysis()">EXECUTE ANALYSIS</button>
        </div>

        <div class="results-panel">
            <div class="output-box">
                <div class="bmi-val" id="bmiOutput">--.-</div>
                <div class="bmi-label" id="bmiStatus">STANDBY MODE</div>
            </div>

            <div class="ideal-weight-box" id="idealBox">
                ESTIMATED_IDEAL: <b>--kg - --kg</b>
            </div>

            <table class="info-table">
                <thead>
                    <tr>
                        <th>PARAMETER</th>
                        <th>RANGE</th>
                    </tr>
                </thead>
                <tbody>
                    <tr id="cat-under"><td>UNDER LEVEL</td><td>&lt; 18.5</td></tr>
                    <tr id="cat-normal"><td>OPTIMAL ZONE</td><td>18.5 - 24.9</td></tr>
                    <tr id="cat-over"><td>WARNING LEVEL</td><td>25.0 - 29.9</td></tr>
                    <tr id="cat-obese"><td>CRITICAL ZONE</td><td>&gt; 30.0</td></tr>
                </tbody>
            </table>
        </div>
    </div>

  
</body>
</html>
